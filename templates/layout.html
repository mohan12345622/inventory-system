<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Alliance Inventory Dashboard{% endblock %}</title>
    <!-- Bootstrap CSS & Google Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --royal-blue: #0B2053;
            --royal-blue-light: #1A3673;
            --gold: #D4AF37;
            --gold-light: #F9E5A3;
            --bg-color: #F4F7FB;
        }
        body { 
            padding-top: 80px; 
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: #333;
        }
        /* Navbar Styling */
        .navbar {
            background: linear-gradient(135deg, var(--royal-blue), var(--royal-blue-light)) !important;
            border-bottom: 3px solid var(--gold);
            box-shadow: 0 4px 12px rgba(11, 32, 83, 0.2);
            padding: 15px 0;
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--gold) !important;
        }
        .nav-link {
            font-weight: 500;
            color: white !important;
            margin: 0 5px;
            transition: all 0.3s ease;
        }
        .nav-link:hover {
            color: var(--gold) !important;
            transform: translateY(-2px);
        }
        
        /* Typography and Headings */
        h2, h4 { color: var(--royal-blue); font-weight: 700; }
        
        /* Buttons */
        .btn-primary, .btn-success {
            background-color: var(--royal-blue) !important;
            border-color: var(--royal-blue) !important;
            color: white !important;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(11, 32, 83, 0.15);
            transition: all 0.3s ease;
        }
        .btn-primary:hover, .btn-success:hover {
            background-color: var(--gold) !important;
            border-color: var(--gold) !important;
            color: var(--royal-blue) !important;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(212, 175, 55, 0.3);
        }
        .btn-outline-primary {
            color: var(--royal-blue);
            border-color: var(--royal-blue);
            font-weight: 600;
        }
        .btn-outline-primary:hover {
            background-color: var(--royal-blue);
            color: var(--gold);
        }
        .btn-warning {
            background-color: var(--gold) !important;
            border-color: var(--gold) !important;
            color: var(--royal-blue) !important;
            font-weight: 600;
        }
        .btn-warning:hover {
            background-color: #E2BC45 !important;
            transform: translateY(-1px);
        }
        
        /* Cards & Forms */
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            overflow: hidden;
            background: white;
        }
        .card-header {
            background: linear-gradient(135deg, var(--royal-blue), var(--royal-blue-light)) !important;
            color: var(--gold) !important;
            border-bottom: none;
            padding: 18px 20px;
        }
        .form-control {
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 10px 15px;
        }
        .form-control:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25);
        }
        
        /* Tables */
        .table-responsive {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
        }
        .table { margin-bottom: 0; }
        .table-dark th {
            background-color: var(--royal-blue) !important;
            color: var(--gold) !important;
            border: none;
            font-weight: 600;
            padding: 15px;
        }
        tbody tr td {
            padding: 15px;
            vertical-align: middle;
            border-color: #f0f0f0;
        }
        tbody tr:hover { background-color: var(--gold-light) !important; }
        
        /* Utilities */
        .low-stock { background-color: #f8d7da !important; color: #721c24; }
        .badge { font-weight: 500; font-size: 0.85em; padding: 6px 10px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('index') }}">
        ✨ Alliance Inventory
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('index') }}">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('projects_list') }}">Projects</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('add') }}">Add Product</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-warning alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
